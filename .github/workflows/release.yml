name: Build & Release

on:
  workflow_dispatch:   # triggered manually from the GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get short commit SHA
        id: ver
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Inject build version into core/version.py
        shell: bash
        run: printf 'BUILD_ID = "%s"\n' "${{ steps.ver.outputs.sha }}" > core/version.py

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --disable-pip-version-check
          python -m pip install -r requirements.txt pyinstaller --disable-pip-version-check

      - name: Ensure versions/ directory exists
        shell: bash
        run: mkdir -p versions

      - name: Build executable
        run: >
          python -m PyInstaller
          --onefile
          --windowed
          --name FrenchTTS
          --icon img\icon.ico
          --add-data "img;img"
          --add-data "versions;versions"
          --collect-all customtkinter
          --collect-all pystray
          --collect-all PIL
          --collect-all faster_whisper
          --collect-all ctranslate2
          --hidden-import pystray._win32
          --hidden-import sounddevice
          --hidden-import miniaudio
          --hidden-import aiohttp
          --hidden-import certifi
          --hidden-import numpy
          --hidden-import keyboard
          main.py

      - name: Prepare release body
        id: body
        shell: bash
        run: |
          SHA="${{ steps.ver.outputs.sha }}"
          if [ -f "versions/${SHA}.md" ]; then
            cp "versions/${SHA}.md" release_body.md
          else
            printf "Build %s\n\nAucun changelog fourni pour cette version." "$SHA" > release_body.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "prod-${{ steps.ver.outputs.sha }}"
          name: "FrenchTTS prod-${{ steps.ver.outputs.sha }}"
          body_path: release_body.md
          files: dist/FrenchTTS.exe
