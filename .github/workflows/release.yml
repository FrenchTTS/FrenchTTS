name: Build & Release

on:
  workflow_dispatch:   # triggered manually from the GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git log between release tags

      - name: Get short commit SHA
        id: ver
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Inject build version into core/version.py
        shell: bash
        run: printf 'BUILD_ID = "%s"\n' "${{ steps.ver.outputs.sha }}" > core/version.py

      # Auto-generate versions/<sha>.md from commits since the last prod-* release.
      # Skipped when a hand-written file already exists in the repo
      # (commit versions/<sha>.md before triggering the build to override).
      - name: Generate changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.ver.outputs.sha }}"
          DATE=$(date -u +%Y-%m-%d)

          if [ -f "versions/${SHA}.md" ]; then
            echo "Hand-written changelog found — skipping auto-generation."
            exit 0
          fi

          # Fetch the latest prod-* release tag via GitHub API
          PREV_TAG=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(d.get('tag_name', ''))
except Exception:
    print('')
          " 2>/dev/null || echo "")

          # Verify the tag resolves locally (needs fetch-depth: 0)
          if [ -n "$PREV_TAG" ] && git rev-parse "${PREV_TAG}^{}" >/dev/null 2>&1; then
            RANGE="${PREV_TAG}..HEAD"
            SINCE="depuis \`${PREV_TAG}\`"
          else
            RANGE=""
            SINCE="(premier lancement)"
          fi

          # Collect commit subjects, excluding merge commits
          if [ -n "$RANGE" ]; then
            COMMITS=$(git log "$RANGE" --pretty='- %s' --no-merges)
          else
            COMMITS=$(git log --pretty='- %s' --no-merges)
          fi
          [ -z "$COMMITS" ] && COMMITS="- Maintenance et améliorations internes."

          {
            printf -- "---\nid: %s\ndate: %s\n---\n\n" "$SHA" "$DATE"
            printf "## FrenchTTS \`prod-%s\`\n\n" "$SHA"
            printf "Changements %s :\n\n" "$SINCE"
            printf "%s\n" "$COMMITS"
          } > "versions/${SHA}.md"

          echo "Generated versions/${SHA}.md"
          cat "versions/${SHA}.md"

      # Strip YAML frontmatter so the GitHub release body shows clean markdown.
      # The app strips it itself at runtime; the release page does not.
      - name: Prepare release body
        shell: bash
        env:
          SHA: ${{ steps.ver.outputs.sha }}
        run: |
          python3 - <<'PYEOF'
import os
sha  = os.environ["SHA"]
text = open(f"versions/{sha}.md", encoding="utf-8").read()
if text.startswith("---"):
    end = text.find("---", 3)
    if end != -1:
        text = text[end + 3:].strip()
open("release_body.md", "w", encoding="utf-8").write(text)
PYEOF

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --disable-pip-version-check
          python -m pip install -r requirements.txt pyinstaller --disable-pip-version-check

      - name: Build executable
        run: >
          python -m PyInstaller
          --onefile
          --windowed
          --name FrenchTTS
          --icon img\icon.ico
          --add-data "img;img"
          --add-data "versions;versions"
          --collect-all customtkinter
          --collect-all pystray
          --collect-all PIL
          --collect-all faster_whisper
          --collect-all ctranslate2
          --hidden-import pystray._win32
          --hidden-import sounddevice
          --hidden-import miniaudio
          --hidden-import aiohttp
          --hidden-import certifi
          --hidden-import numpy
          --hidden-import keyboard
          main.py

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "prod-${{ steps.ver.outputs.sha }}"
          name: "FrenchTTS prod-${{ steps.ver.outputs.sha }}"
          body_path: release_body.md
          files: dist/FrenchTTS.exe
