name: Build & Release

on:
  workflow_dispatch:   # triggered manually from the GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git log between release tags

      - name: Get short commit SHA
        id: ver
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Inject build version into core/version.py
        shell: bash
        run: printf 'BUILD_ID = "%s"\n' "${{ steps.ver.outputs.sha }}" > core/version.py

      # Auto-generate versions/<sha>.md from commits since the last prod-* release.
      # Skipped when a hand-written file already exists (commit it before triggering).
      # docs:, ci:, chore:, build:, style: commits are excluded — only user-facing
      # changes (feat:, fix:, perf:, revert:, …) appear in the What's New dialog.
      - name: Generate changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.ver.outputs.sha }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          if [ -f "versions/${SHA}.md" ]; then
            echo "Hand-written changelog found — skipping auto-generation."
            exit 0
          fi

          PREV_TAG=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name','') or '')" \
            2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ] && git rev-parse "${PREV_TAG}^{}" >/dev/null 2>&1; then
            RANGE="${PREV_TAG}..HEAD"
            SINCE="depuis \`${PREV_TAG}\`"
          else
            RANGE=""
            SINCE="(premier lancement)"
          fi

          if [ -n "$RANGE" ]; then
            RAW=$(git log "$RANGE" --pretty='%s' --no-merges)
          else
            RAW=$(git log --pretty='%s' --no-merges)
          fi

          # Group commits by conventional-commit type, stripping the prefix.
          # { grep ... || true; } prevents exit code 1 (no match) from killing
          # the script under bash -e -o pipefail.
          FEAT=$(printf '%s\n'  "$RAW" | { grep -E '^feat(\([^)]*\))?!?:'  || true; } | sed 's/^feat[^:]*: */- /')
          FIX=$(printf '%s\n'   "$RAW" | { grep -E '^fix(\([^)]*\))?!?:'   || true; } | sed 's/^fix[^:]*: */- /')
          PERF=$(printf '%s\n'  "$RAW" | { grep -E '^perf(\([^)]*\))?!?:'  || true; } | sed 's/^perf[^:]*: */- /')
          OTHER=$(printf '%s\n' "$RAW" \
            | { grep -vE '^(feat|fix|perf|docs|ci|chore|build|style)(\([^)]*\))?!?:' || true; } \
            | { grep -v '^$' || true; } \
            | sed 's/^/- /')

          # Write the file section by section (avoids %b portability issues).
          {
            printf -- "---\nid: %s\ndate: %s\n---\n\n## FrenchTTS \`prod-%s\`\n\n" "$SHA" "$DATE" "$SHA"
            if [ -n "$FEAT"  ]; then printf "### Nouveautés\n\n%s\n\n"    "$FEAT";  fi
            if [ -n "$FIX"   ]; then printf "### Corrections\n\n%s\n\n"   "$FIX";   fi
            if [ -n "$PERF"  ]; then printf "### Performances\n\n%s\n\n"  "$PERF";  fi
            if [ -n "$OTHER" ]; then printf "### Autres\n\n%s\n\n"        "$OTHER"; fi
            if [ -z "${FEAT}${FIX}${PERF}${OTHER}" ]; then
              printf "Maintenance et améliorations internes.\n"
            fi
          } > "versions/${SHA}.md"

          echo "Generated versions/${SHA}.md:"
          cat "versions/${SHA}.md"

      # Strip YAML frontmatter (--- ... ---) so the GitHub release body renders
      # as clean markdown. The app strips it itself at runtime.
      - name: Prepare release body
        shell: bash
        env:
          SHA: ${{ steps.ver.outputs.sha }}
        run: |
          awk 'BEGIN{fm=0;out=0} !out&&/^---$/{fm++;if(fm==2)out=1;next} out{print}' \
            "versions/${SHA}.md" | sed '/./,$!d' > release_body.md

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --disable-pip-version-check
          python -m pip install -r requirements.txt pyinstaller --disable-pip-version-check

      # Step 1 — build the main application
      - name: Build FrenchTTS.exe
        run: >
          python -m PyInstaller
          --onefile
          --windowed
          --name FrenchTTS
          --icon img\icon.ico
          --add-data "img;img"
          --add-data "versions;versions"
          --collect-all customtkinter
          --collect-all pystray
          --collect-all PIL
          --collect-all faster_whisper
          --collect-all ctranslate2
          --hidden-import pystray._win32
          --hidden-import sounddevice
          --hidden-import miniaudio
          --hidden-import aiohttp
          --hidden-import certifi
          --hidden-import numpy
          --hidden-import keyboard
          main.py

      # Step 2 — build the installer (bundles dist/FrenchTTS.exe inside it)
      - name: Build FrenchTTSInstaller.exe
        run: >
          python -m PyInstaller
          --onefile
          --windowed
          --name FrenchTTSInstaller
          --add-data "dist/FrenchTTS.exe;."
          installer/installer_main.py

      # Publish ONLY the installer as the release asset.
      # Users always download FrenchTTSInstaller.exe — it contains FrenchTTS.exe
      # inside, so the exe they run is guaranteed to match the release version.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "prod-${{ steps.ver.outputs.sha }}"
          name: "FrenchTTS prod-${{ steps.ver.outputs.sha }}"
          body_path: release_body.md
          files: dist/FrenchTTSInstaller.exe
